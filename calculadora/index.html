<!DOCTYPE html>
<html lang="es">

<head>  
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora con JavaScript ES6</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="contenedor">
        <h1>Calculadora básica</h1>
        <p>Ingrese dos números y seleccione una operación.</p>
        <form id="formularioCalculadora">
            <label for="numeroUno">Primer número:</label>
            <input type="number" id="numeroUno" placeholder="Ejemplo: 10">
            <label for="numeroDos">Segundo número:</label>
            <input type="number" id="numeroDos" placeholder="Ejemplo: 5">
            <label for="operacion">Operación:</label>
            <select id="operacion">
                <option value="">Seleccione una operación</option>
                <option value="suma">Suma</option>
                <option value="resta">Resta</option>
                <option value="multiplicacion">Multiplicación</option>
                <option value="division">División</option>
            </select>
            <button type="submit">Calcular</button>
        </form>
        <section id="resultado" class="resultado">
            Aquí aparecerá el resultado.
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
