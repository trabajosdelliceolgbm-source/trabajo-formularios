<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Notas Chile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>📊 Sistema de Notas</h1>
    <p class="sub">Escala Chile (1.0 - 7.0)</p>

    <form id="formulario">

      <input type="number" id="nota1" placeholder="Nota 1" min="1" max="7" step="0.1" required>
      <input type="number" id="nota2" placeholder="Nota 2" min="1" max="7" step="0.1" required>
      <input type="number" id="nota3" placeholder="Nota 3" min="1" max="7" step="0.1" required>

      <button type="submit">Calcular promedio</button>

    </form>

    <p id="error"></p>
    <div id="resultado"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
